# Flow cơ bản
# 5 BƯỚC QUAN TRỌNG
# 1: Trường hợp nào chạy workflows này?
# - push code trực tiếp lên branch chỉ định
# - tạo pull request vào branch chỉ định
# LƯU Ý: CHỈ TRIGGER ĐÚNG FOLDER CẦN CHẠY
# 2: checkout (lấy code mới nhất) source code mới nhất từ github
# 3: cài môi trường java trên máy ảo (cùng version JDK trong pom)
# + lưu các cài đặt thư viện vào cache
# 4: cài các browser (chrome)
# 5: chạy testcase (mvn test -Dheadless=true)

# MỘT SỐ BƯỚC NÂNG CAO (ALLURE REPORT + GỬI VỀ SLACK)
# 6: tạo allure report mỗi lần chạy test
# 7: tạo file allure-report.zip để download về và xem
# 8: lấy số liệu report => testng-results.xml
# 9: gửi report về slack

name: Selenium POM CI

# B1: Trigger chạy workflow này
on:
   push:
     branches:
       - main
     paths:
       - "selenium-pom/**"
       - ".github/workflows/selenium-pom-ci.yml"
   pull_request:
     branches:
       - main
     paths:
       - "selenium-pom/**"
       - ".github/workflows/selenium-pom-ci.yml"

# sẽ tự động cd vào folder cần chạy
defaults:
  run:
    working-directory: selenium-pom
jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium Tests
        run: mvn -B test -Dheadless=true -Djava.awt.headless=true

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: selenium-pom/target/site/allure-maven-plugin
          retention-days: 7 # tự xóa artifact sau 7 ngày để đỡ tốn dung lượng

      - name: Read TestNG Results
        if: always()
        id: test-summary
        run: |
          # code theo kiểu sh linux
          FILE="target/surefire-reports/testng-results.xml"
          # $(...) chạy lệnh bên trong () và lấy kết quả lưu và biến (variable)
          # VD: TOTAL=$(lệnh) => kết quả chạy lệnh sẽ lưu vào biến toal
          # total="1" passed="0" failed="1"
          # [0-9]* => regular expression
          # total="7" => grep -o 'total="[0-9]*"' "$FILE" | grep -o '[0-9]*'
          TOTAL=$(grep -o 'total="[0-9]*"' "$FILE" | grep -o '[0-9]*')
          PASSED=$(grep -o 'passed="[0-9]*"' "$FILE" | grep -o '[0-9]*')
          FAILED=$(grep -o 'failed="[0-9]*"' "$FILE" | grep -o '[0-9]*')
          
          # GITHUB_OUTPUT: có sẵn của github action
          # biến này giúp lưu trữ giá trị và để cho các step phía sau dùng tới
          # lưu giá trị vào GITHUB_OUTPUT thì dùng dấu >>
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          {
            echo "message<<MSG_EOF"
            echo "Result: ${{ job.status }} - selenium-pom"
            echo "Total: $TOTAL | Passed: $PASSED | Failed: $FAILED"
            echo "Detail: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "MSG_EOF"
        
           } >> "$GITHUB_OUTPUT"

      - name: Send Report to Slack
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{secrets.SLACK_WEBHOOK_URL}}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{steps.test-summary.outputs.message}}"
            }